services:
  - type: web
    name: notaflow-ec
    runtime: python
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT
    healthCheckPath: /api/health
    envVars:
      - key: AI_MODE
        value: mock
      - key: PYTHON_VERSION
        value: 3.12.10
